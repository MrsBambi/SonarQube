name: CI Python (Black & Pytest)

# Se ejecutará al hacer push o abrir un Pull Request en la rama principal
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Trabajo 1: Comprobar el formateo con Black
  lint:
    name: Formateo con Black
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Ejecutar Black
        # Usamos la acción oficial de la Python Software Foundation
        uses: psf/black@stable
        with:
          # --check asegura que el workflow falle si hay código mal formateado
          # --diff muestra en los logs de GitHub qué líneas están mal
          options: "--check --diff"
          src: "."

  # Trabajo 2: Ejecutar los tests
  test:
    name: Tests con Pytest
    runs-on: ubuntu-latest
    # Se ejecuta solo si el linter (Black) ha pasado exitosamente
    needs: lint 
    
    # Podemos probar en múltiples versiones de Python con una matriz
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # Acelera las ejecuciones cacheando las dependencias

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          # Asegúrate de tener un requirements.txt, o adapta esto si usas Poetry/Pipenv
          pip install -r requirements.txt
          pip install pytest

      - name: Ejecutar tests con Pytest
        run: |
          pytest